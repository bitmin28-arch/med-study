<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>病理学 · 肿瘤提纲带背</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --accent: #8b5cf6;
            --border: #334155;
            --green: #10b981;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Helvetica, Arial, "Noto Sans CJK SC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 50px;
        }
        
        header {
            position: sticky;
            top: 0;
            background-color: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .header-title-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-home-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.82rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .back-home-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .progress-container {
            width: 100%;
            background-color: rgba(255,255,255,0.05);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.4s ease;
            box-shadow: 0 0 8px var(--primary-glow);
        }
        
        .progress-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
            margin-top: -10px;
            margin-bottom: 10px;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .search-box {
            display: flex;
            background-color: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            align-items: center;
        }
        
        .search-box input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            font-size: 0.9rem;
            outline: none;
        }
        
        .search-box input::placeholder {
            color: var(--text-muted);
        }
        
        .filter-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        
        .filter-row::-webkit-scrollbar {
            display: none;
        }
        
        .tab-btn, .filter-select {
            background-color: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }
        
        .filter-select {
            background-color: rgba(30, 41, 59, 0.8);
            color: var(--text-color);
            outline: none;
        }
        
        .actions-row {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
        }
        
        .action-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .action-btn:hover, .action-btn:active {
            background-color: rgba(255,255,255,0.05);
            color: white;
        }
        
        .container {
            max-width: 768px;
            margin: 20px auto;
            padding: 0 15px;
        }
        
        /* 空状态占位提示样式 */
        .empty-tips {
            border: 1px dashed var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
            background: rgba(30, 41, 59, 0.2);
            font-size: 0.92rem;
            line-height: 1.6;
        }
        
        .empty-tips-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .empty-tips-btn {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 15px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(139, 92, 246, 0.2);
        }
        .empty-tips-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        @media (max-width: 480px) {
            header { padding: 10px 15px; }
            .container { padding: 0 10px; }
        }
        
        /* 思维导图 Modal 样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(3, 7, 18, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #94a3b8;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 1010;
        }
        .modal-close:hover {
            color: #f3f4f6;
        }
        .modal-content-wrapper {
            display: flex;
            flex-direction: column;
            width: 95%;
            height: 90%;
            max-width: 1200px;
            position: relative;
        }
        .modal-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            z-index: 1005;
        }
        .modal-btn {
            background-color: #1e293b;
            color: #f3f4f6;
            border: 1px solid #334155;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.88rem;
            transition: all 0.2s;
            user-select: none;
        }
        .modal-btn:hover {
            background-color: #334155;
            border-color: #475569;
        }
        .modal-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .modal-page-num {
            color: #94a3b8;
            font-size: 0.88rem;
        }
        .modal-viewport {
            flex: 1;
            width: 100%;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid #1e293b;
            background-color: #030712;
            position: relative;
            cursor: grab;
        }
        .modal-viewport:active {
            cursor: grabbing;
        }
        #mindmap-img {
            position: absolute;
            max-width: none;
            max-height: none;
            transform-origin: 0 0;
            transition: transform 0.05s ease-out;
            user-select: none;
            -webkit-user-drag: none;
        }
        
        .loading-spinner {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40px; height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 1003;
            display: none;
        }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="header-title-row">
                <a href="../../index.html" class="back-home-btn">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    返回主页
                </a>
                <h1>病理学 · 肿瘤提纲带背</h1>
                
                <button class="back-home-btn" onclick="openMindmap()" style="background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(139, 92, 246, 0.15)); border-color: rgba(59, 130, 246, 0.4); color: #fff;">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 2px;"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                    思维导图
                </button>
            </div>
            <button class="action-btn" onclick="resetProgress()">重置状态</button>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-text" id="progress-text">已掌握 0 / 0 (0%)</div>
        
        <div class="controls">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索问题关键字..." oninput="filterCards()">
            </div>
            
            <div class="filter-row">
                <button class="tab-btn active" onclick="filterSection('all')">全部章节</button>
            </div>
            
            <div class="actions-row">
                <select class="filter-select" id="diff-filter" onchange="filterCards()">
                    <option value="all">全部难度</option>
                    <option value="I级">I级 (简单)</option>
                    <option value="II级">II级 (中等)</option>
                    <option value="III级">III级 (较难)</option>
                </select>
                
                <select class="filter-select" id="imp-filter" onchange="filterCards()">
                    <option value="all">全部重要度</option>
                    <option value="A">A级 (极重要)</option>
                    <option value="B">B级 (重要)</option>
                    <option value="C">C级 (一般)</option>
                </select>
                
                <button class="action-btn-toggle" id="star-filter-btn" onclick="toggleStarFilter()">⭐️ 仅看星标</button>
                <button class="action-btn-toggle" id="eb-filter-btn" onclick="toggleEbFilter()">🕒 今日待复习</button>
                
                <button class="action-btn" id="toggle-all-btn" onclick="toggleAllAnswers()">全部展开</button>
            </div>
        </div>
    </header>

    <div class="container" id="cards-container">
        <!-- 病理学本章提纲尚待录入，展示空状态及快速浏览大图按钮 -->
        <div class="empty-tips">
            <div class="empty-tips-title">💡 本章自测提纲正在建设中</div>
            <div>我们已同步上线了天天师兄的精编版思维导图与笔记（共 4 页）</div>
            <div>建议您点击下方按钮或右上角“思维导图”开始浏览。</div>
            <button class="empty-tips-btn" onclick="openMindmap()">📚 立即浏览本章思维导图</button>
        </div>
    </div>
    
    <!-- 思维导图灯箱 HTML -->
    <div id="mindmap-modal" class="modal">
        <span class="modal-close" onclick="closeMindmap()">&times;</span>
        <div class="modal-content-wrapper">
            <div class="modal-controls">
                <button class="modal-btn" id="prev-map-btn" onclick="changeMap(-1)">上一张</button>
                <span class="modal-page-num" id="map-page-num">1 / 1</span>
                <button class="modal-btn" id="next-map-btn" onclick="changeMap(1)">下一张</button>
                <button class="modal-btn" onclick="resetZoom()">1:1 重置</button>
            </div>
            <div class="modal-viewport" id="map-viewport">
                <div class="loading-spinner" id="spinner"></div>
                <img id="mindmap-img" src="" alt="思维导图" draggable="false">
            </div>
        </div>
    </div>

    <script>
        // WebDAV 备用空对象，防止 sync 脚本抛出未定义异常
        window.WebDAVSync = {
            isEnabled() { return false; },
            getConfig() { return null; }
        };
        
        let masteredIds = new Set();
        let starredIds = new Set();
        let ebbinghausDict = {};
        
        let currentSection = 'all';
        let allExpanded = false;
        let starFilterActive = false;
        let ebFilterActive = false;
        
        const storageKey = 'pathology_ch07-oncology_mastered';
        const starredKey = storageKey.replace('_mastered', '_starred');
        const ebbinghausKey = storageKey.replace('_mastered', '_ebbinghaus');

        window.addEventListener('DOMContentLoaded', () => {
            updateProgress();
        });

        function updateProgress() {
            const total = document.querySelectorAll('.qa-card').length;
            const mastered = masteredIds.size;
            const pct = total > 0 ? Math.round((mastered / total) * 100) : 0;
            
            document.getElementById('progress-bar').style.width = pct + '%';
            document.getElementById('progress-text').innerText = `已掌握 ${mastered} / ${total} (${pct}%)`;
        }

        function resetProgress() {
            alert("本章自测卡片暂未发布，无需重置状态。");
        }

        function toggleStarFilter() {}
        function toggleEbFilter() {}
        function filterSection(sec) {}
        function filterCards() {}
        function toggleAllAnswers() {}
        
        // ==========================================
        // 思维导图灯箱交互与自适应缩放平移控制逻辑
        // ==========================================
        const mapImages = ["images/page_127.png?v=1781183759", "images/page_128.png?v=1781183759", "images/page_129.png?v=1781183759", "images/page_130.png?v=1781183759"];
        let zoom = 1;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let currentMapIdx = 0;

        const viewport = document.getElementById('map-viewport');
        const img = document.getElementById('mindmap-img');
        const spinner = document.getElementById('spinner');

        function openMindmap() {
            if (mapImages.length === 0) return;
            document.getElementById('mindmap-modal').style.display = 'flex';
            currentMapIdx = 0;
            updateMapDisplay();
        }

        function closeMindmap() {
            document.getElementById('mindmap-modal').style.display = 'none';
        }

        function updateMapDisplay() {
            if (mapImages.length === 0) return;
            spinner.style.display = 'block';
            img.src = mapImages[currentMapIdx];
            document.getElementById('map-page-num').innerText = `${currentMapIdx + 1} / ${mapImages.length}`;
            document.getElementById('prev-map-btn').disabled = currentMapIdx === 0;
            document.getElementById('next-map-btn').disabled = currentMapIdx === mapImages.length - 1;
            
            zoom = 1;
            panX = 0;
            panY = 0;
            img.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
            
            img.onload = function() {
                spinner.style.display = 'none';
                fitToScreen();
            };
        }

        function changeMap(dir) {
            currentMapIdx += dir;
            if (currentMapIdx < 0) currentMapIdx = 0;
            if (currentMapIdx >= mapImages.length) currentMapIdx = mapImages.length - 1;
            updateMapDisplay();
        }

        function fitToScreen() {
            const vpW = viewport.clientWidth;
            const vpH = viewport.clientHeight;
            const imgW = img.naturalWidth || 800;
            const imgH = img.naturalHeight || 1100;
            
            const scaleX = vpW / imgW;
            const scaleY = vpH / imgH;
            zoom = Math.min(scaleX, scaleY) * 0.96;
            if (zoom < 0.05) zoom = 0.5;
            
            panX = (vpW - imgW * zoom) / 2;
            panY = (vpH - imgH * zoom) / 2;
            updateTransform();
        }

        function resetZoom() {
            fitToScreen();
        }

        function updateTransform() {
            img.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
        }

        // 鼠标拖拽平移
        viewport.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            isDragging = true;
            startX = e.clientX - panX;
            startY = e.clientY - panY;
            e.preventDefault();
        });
        
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            panX = e.clientX - startX;
            panY = e.clientY - startY;
            updateTransform();
        });
        
        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // 滚轮缩放
        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const factor = 1.15;
            const rect = viewport.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const ix = (mx - panX) / zoom;
            const iy = (my - panY) / zoom;
            
            if (e.deltaY < 0) {
                zoom *= factor;
            } else {
                zoom /= factor;
            }
            zoom = Math.min(Math.max(zoom, 0.05), 10);
            
            panX = mx - ix * zoom;
            panY = my - iy * zoom;
            updateTransform();
        }, { passive: false });

        // 触摸手势平移缩放
        let lastTX = 0, lastTY = 0, pinchDist = 0, pinchZoom = 1;
        function getDist(t1, t2) {
            return Math.sqrt((t1.clientX - t2.clientX)**2 + (t1.clientY - t2.clientY)**2);
        }
        viewport.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                lastTX = e.touches[0].clientX;
                lastTY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                pinchDist = getDist(e.touches[0], e.touches[1]);
                pinchZoom = zoom;
            }
        });
        
        viewport.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                const dx = e.touches[0].clientX - lastTX;
                const dy = e.touches[0].clientY - lastTY;
                panX += dx;
                panY += dy;
                lastTX = e.touches[0].clientX;
                lastTY = e.touches[0].clientY;
                updateTransform();
            } else if (e.touches.length === 2) {
                const d = getDist(e.touches[0], e.touches[1]);
                const nz = Math.min(Math.max(pinchZoom * d / pinchDist, 0.05), 10);
                const rect = viewport.getBoundingClientRect();
                const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
                const my = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
                const ix = (mx - panX) / zoom;
                const iy = (my - panY) / zoom;
                
                zoom = nz;
                panX = mx - ix * zoom;
                panY = my - iy * zoom;
                updateTransform();
            }
            e.preventDefault();
        }, { passive: false });
        
        viewport.addEventListener('touchend', () => {
            isDragging = false;
        });

        // 键盘左右方向键及 Esc 关闭键
        document.addEventListener('keydown', (e) => {
            const modal = document.getElementById('mindmap-modal');
            if (modal.style.display === 'flex') {
                if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changeMap(-1);
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeMap(1);
                if (e.key === 'Escape') closeMindmap();
            }
        });
    </script>
</body>
</html>
