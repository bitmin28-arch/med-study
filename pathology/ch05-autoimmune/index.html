<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>病理学 · 自身免疫病</title>
    <meta name="description" content="病理学 · 自身免疫病 - 天天师兄思维导图精编版">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #030712;
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        header {
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.98) 0%, rgba(15, 23, 42, 0.92) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 16px 20px;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
        }
        
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            gap: 12px;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            transition: all 0.2s;
        }
        .back-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
        }
        
        h1 {
            font-size: 1.1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #a78bfa, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            flex: 1;
        }
        
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-btn {
            background: rgba(30, 41, 59, 0.8);
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .nav-btn:hover { background: #334155; border-color: #475569; color: #fff; }
        .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        
        .page-info {
            color: #94a3b8;
            font-size: 0.85rem;
            min-width: 70px;
            text-align: center;
        }
        
        .viewport {
            position: fixed;
            top: 65px; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            cursor: grab;
            background: #030712;
        }
        .viewport:active { cursor: grabbing; }
        
        #page-container {
            position: absolute;
            transform-origin: 0 0;
            display: inline-block;
        }
        
        #page-img {
            display: block;
            max-width: none;
            max-height: none;
            user-select: none;
            -webkit-user-drag: none;
        }
        
        .loading-spinner {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.05);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 50;
        }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
<body>
    <header>
        <div class="header-row">
            <a href="../../index.html" class="back-btn">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                返回
            </a>
            <h1>病理学 · 自身免疫病</h1>
            <div class="nav-controls">
                <button class="nav-btn" id="prev-btn" onclick="changePage(-1)">上一页</button>
                <span class="page-info" id="page-info">1 / 10</span>
                <button class="nav-btn" id="next-btn" onclick="changePage(1)">下一页</button>
                <button class="nav-btn" onclick="resetView()">适应</button>
            </div>
        </div>
    </header>

    <div class="viewport" id="viewport">
        <div id="page-container">
            <img id="page-img" src="" alt="病理笔记" draggable="false">
        </div>
    </div>
    <div class="loading-spinner" id="spinner"></div>

    <script>
        const pages = ["images/page_103.png?v=1781182245", "images/page_104.png?v=1781182245", "images/page_105.png?v=1781182245", "images/page_106.png?v=1781182245", "images/page_107.png?v=1781182245", "images/page_108.png?v=1781182245", "images/page_109.png?v=1781182245", "images/page_110.png?v=1781182245", "images/page_111.png?v=1781182245", "images/page_112.png?v=1781182245"];
        let currentPage = 0;
        let zoom = 1, panX = 0, panY = 0;
        let isDragging = false, startX = 0, startY = 0;

        const viewport = document.getElementById('viewport');
        const container = document.getElementById('page-container');
        const img = document.getElementById('page-img');
        const spinner = document.getElementById('spinner');

        function updateTransform() {
            container.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
        }

        function showPage() {
            spinner.style.display = 'block';
            img.src = pages[currentPage];
            document.getElementById('page-info').innerText = `${currentPage + 1} / ${pages.length}`;
            document.getElementById('prev-btn').disabled = currentPage === 0;
            document.getElementById('next-btn').disabled = currentPage === pages.length - 1;
            
            img.onload = function() {
                spinner.style.display = 'none';
                fitToScreen();
            };
        }

        function fitToScreen() {
            const vpW = viewport.clientWidth;
            const vpH = viewport.clientHeight;
            const imgW = img.naturalWidth || 800;
            const imgH = img.naturalHeight || 1100;
            
            const scaleX = vpW / imgW;
            const scaleY = vpH / imgH;
            zoom = Math.min(scaleX, scaleY) * 0.98;
            if (zoom < 0.05) zoom = 0.5;
            
            panX = (vpW - imgW * zoom) / 2;
            panY = (vpH - imgH * zoom) / 2;
            updateTransform();
        }

        function resetView() { fitToScreen(); }

        function changePage(dir) {
            currentPage += dir;
            if (currentPage < 0) currentPage = 0;
            if (currentPage >= pages.length) currentPage = pages.length - 1;
            showPage();
        }

        // 鼠标拖拽
        viewport.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            isDragging = true;
            startX = e.clientX - panX;
            startY = e.clientY - panY;
            e.preventDefault();
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            panX = e.clientX - startX;
            panY = e.clientY - startY;
            updateTransform();
        });
        window.addEventListener('mouseup', () => { isDragging = false; });

        // 滚轮缩放
        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const factor = 1.1;
            const rect = viewport.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const ix = (mx - panX) / zoom;
            const iy = (my - panY) / zoom;
            zoom *= (e.deltaY < 0) ? factor : (1 / factor);
            zoom = Math.min(Math.max(zoom, 0.05), 10);
            panX = mx - ix * zoom;
            panY = my - iy * zoom;
            updateTransform();
        }, { passive: false });

        // 触摸手势
        let lastTX = 0, lastTY = 0, pinchDist = 0, pinchZoom = 1;
        function getDist(t1, t2) {
            return Math.sqrt((t1.clientX - t2.clientX)**2 + (t1.clientY - t2.clientY)**2);
        }
        viewport.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                lastTX = e.touches[0].clientX;
                lastTY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                pinchDist = getDist(e.touches[0], e.touches[1]);
                pinchZoom = zoom;
            }
        });
        viewport.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                panX += e.touches[0].clientX - lastTX;
                panY += e.touches[0].clientY - lastTY;
                lastTX = e.touches[0].clientX;
                lastTY = e.touches[0].clientY;
                updateTransform();
            } else if (e.touches.length === 2) {
                const d = getDist(e.touches[0], e.touches[1]);
                const nz = Math.min(Math.max(pinchZoom * d / pinchDist, 0.05), 10);
                const rect = viewport.getBoundingClientRect();
                const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
                const my = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
                const ix = (mx - panX) / zoom;
                const iy = (my - panY) / zoom;
                zoom = nz;
                panX = mx - ix * zoom;
                panY = my - iy * zoom;
                updateTransform();
            }
            e.preventDefault();
        }, { passive: false });
        viewport.addEventListener('touchend', () => { isDragging = false; });

        // 键盘翻页
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changePage(-1);
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
        });

        showPage();
    </script>
</body>
</html>
